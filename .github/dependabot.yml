# .github/dependabot.yml

version: 2

updates:
  # =========================
  # pnpm Dependencies (via npm ecosystem)
  # =========================
  - package-ecosystem: "npm"
    directory: "/"              # or "/client" if package.json is inside a subfolder
    target-branch: "main"       # always open PRs against main
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Kolkata"

    groups:
      # 1 PR for all patch updates (1.2.3 → 1.2.4)
      patch-updates:
        update-types:
          - "patch"

      # 1 PR for all minor updates (1.2.4 → 1.3.0)
      minor-updates:
        update-types:
          - "minor"

    allow:
      - dependency-type: "all"


    labels:
      - "dependencies"
      - "pnpm"                   # you can keep this label for clarity


    commit-message:
      prefix: "chore"
      include: "scope"


  # =========================
  # GitHub Actions
  # =========================
  - package-ecosystem: "github-actions"
    directory: "/"
    target-branch: "main"       # always open PRs against main
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Kolkata"


    labels:
      - "dependencies"
      - "github-actions"
      - "devops"


    commit-message:
      prefix: "ci"


    groups:
      # 1 PR for all patch updates of GitHub Actions
      patch-updates:
        update-types:
          - "patch"

      # 1 PR for all minor updates of GitHub Actions
      minor-updates:
        update-types:
          - "minor"